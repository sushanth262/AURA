upstream bff {
    server aura-bff-api:8080;
}

upstream frontend {
    server aura-frontend:80;
}

server {
    listen 80;
    server_name _;

    # API requests -> BFF
    location /v1/ {
        proxy_pass http://bff;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade -> BFF
    location /ws {
        proxy_pass http://bff;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Health check endpoints on BFF
    location /healthz {
        proxy_pass http://bff;
    }

    # TradeHawk (trade-scout-viewer on host :3001). HTTP mirror of ssl config; BASE_PATH=/scout.
    location = /scout {
        return 301 $scheme://$host/scout/;
    }

    location /scout/ {
        proxy_pass http://172.17.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> Frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
