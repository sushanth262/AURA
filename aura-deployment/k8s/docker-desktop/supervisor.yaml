apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-supervisor
  namespace: {{NAMESPACE}}
  labels:
    app: aura-supervisor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aura-supervisor
  template:
    metadata:
      labels:
        app: aura-supervisor
    spec:
{{IMAGE_PULL_SECRETS}}
      containers:
        - name: aura-supervisor
          image: {{SUPERVISOR_IMAGE}}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: HTTP_ADDR
              value: ":8082"
            - name: AUTH_DEV_MOCK
              value: "true"
            - name: AUTH_DEV_JWT_SECRET
              value: '{{AUTH_DEV_JWT_SECRET}}'
            - name: POLICY_VERSION
              value: "stub-v1"
            - name: WORKER_URL
              value: '{{WORKER_URL}}'
            - name: WORKER_SOURCES
              value: "grafana,github,jira"
            - name: INTERNAL_SHARED_SECRET
              value: '{{INTERNAL_SHARED_SECRET}}'
---
apiVersion: v1
kind: Service
metadata:
  name: aura-supervisor
  namespace: {{NAMESPACE}}
spec:
  type: NodePort
  selector:
    app: aura-supervisor
  ports:
    - port: 8082
      targetPort: 8082
      nodePort: 30882
