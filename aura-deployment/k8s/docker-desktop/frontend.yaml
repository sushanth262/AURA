# aura-frontend (nginx static bundle). NodePort 30900 -> http://127.0.0.1:30900
# Build image with EXPO_PUBLIC_* pointing at local BFF: http://127.0.0.1:30880/v1 and ws://127.0.0.1:30880
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-frontend
  namespace: {{NAMESPACE}}
  labels:
    app: aura-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aura-frontend
  template:
    metadata:
      labels:
        app: aura-frontend
    spec:
{{IMAGE_PULL_SECRETS}}
      containers:
        - name: aura-frontend
          image: {{FRONTEND_IMAGE}}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: aura-frontend
  namespace: {{NAMESPACE}}
spec:
  type: NodePort
  selector:
    app: aura-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30900
