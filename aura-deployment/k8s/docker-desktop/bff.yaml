apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-bff-api
  namespace: {{NAMESPACE}}
  labels:
    app: aura-bff-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aura-bff-api
  template:
    metadata:
      labels:
        app: aura-bff-api
    spec:
{{IMAGE_PULL_SECRETS}}
      containers:
        - name: aura-bff-api
          image: {{BFF_IMAGE}}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: HTTP_ADDR
              value: ":8080"
            - name: AUTH_DEV_MOCK
              value: "true"
            - name: AUTH_DEV_JWT_SECRET
              value: '{{AUTH_DEV_JWT_SECRET}}'
            - name: AUTHZ_URL
              value: '{{AUTHZ_URL}}'
            - name: SUPERVISOR_URL
              value: '{{SUPERVISOR_URL}}'
            - name: INTERNAL_SHARED_SECRET
              value: '{{INTERNAL_SHARED_SECRET}}'
            - name: CORS_ALLOWED_ORIGINS
              value: '{{CORS_ALLOWED_ORIGINS}}'
---
apiVersion: v1
kind: Service
metadata:
  name: aura-bff-api
  namespace: {{NAMESPACE}}
spec:
  type: NodePort
  selector:
    app: aura-bff-api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30880
