# Docker Desktop Kubernetes — aura-worker (NodePort 30883 on localhost).
# Placeholders expanded by deploy-azure-backend-common.ps1.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-worker
  namespace: {{NAMESPACE}}
  labels:
    app: aura-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aura-worker
  template:
    metadata:
      labels:
        app: aura-worker
    spec:
{{IMAGE_PULL_SECRETS}}
      containers:
        - name: aura-worker
          image: {{WORKER_IMAGE}}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: HTTP_ADDR
              value: ":8083"
            - name: WORKER_ENABLED_SOURCES
              value: "grafana,github,jira"
---
apiVersion: v1
kind: Service
metadata:
  name: aura-worker
  namespace: {{NAMESPACE}}
spec:
  type: NodePort
  selector:
    app: aura-worker
  ports:
    - port: 8083
      targetPort: 8083
      nodePort: 30883
