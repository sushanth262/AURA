# Docker Compose for Azure VM deployment — pulls pre-built GHCR images.
# Placeholders ({{...}}) are expanded by deploy-azure-vm.ps1 before deployment.

services:
  aura-worker:
    image: {{WORKER_IMAGE}}
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8083"
      WORKER_ENABLED_SOURCES: "grafana,github,jira"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  aura-authz:
    image: {{AUTHZ_IMAGE}}
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8081"
      POLICY_VERSION: "stub-v1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  aura-supervisor:
    image: {{SUPERVISOR_IMAGE}}
    restart: unless-stopped
    depends_on:
      - aura-worker
    environment:
      HTTP_ADDR: ":8082"
      AUTH_DEV_MOCK: "true"
      AUTH_DEV_JWT_SECRET: "{{AUTH_DEV_JWT_SECRET}}"
      POLICY_VERSION: "stub-v1"
      WORKER_URL: "http://aura-worker:8083"
      WORKER_SOURCES: "grafana,github,jira"
      INTERNAL_SHARED_SECRET: "{{INTERNAL_SHARED_SECRET}}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  aura-bff-api:
    image: {{BFF_IMAGE}}
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - aura-authz
      - aura-supervisor
    environment:
      HTTP_ADDR: ":8080"
      AUTH_DEV_MOCK: "true"
      AUTH_DEV_JWT_SECRET: "{{AUTH_DEV_JWT_SECRET}}"
      AUTHZ_URL: "http://aura-authz:8081"
      SUPERVISOR_URL: "http://aura-supervisor:8082"
      INTERNAL_SHARED_SECRET: "{{INTERNAL_SHARED_SECRET}}"
      CORS_ALLOWED_ORIGINS: "{{CORS_ALLOWED_ORIGINS}}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  aura-frontend:
    image: {{FRONTEND_IMAGE}}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - aura-bff-api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
