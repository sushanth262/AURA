name: Backend tests

on:
  push:
    paths:
      - 'aura-backend/**'
      - '.github/workflows/backend-test.yml'
  pull_request:
    paths:
      - 'aura-backend/**'
      - '.github/workflows/backend-test.yml'

jobs:
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aura-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: aura-backend/go.sum
      - name: go test
        run: go test ./... -count=1 -race
